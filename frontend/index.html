<!DOCTYPE html>
<html lang="ms">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>JomReply.ai</title>
    <!-- Load runtime env SYNCHRONOUSLY before React -->
    <script>
      (function() {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/api/config/env.js', false); // synchronous
        xhr.send(null);
        if (xhr.status === 200) {
          try { eval(xhr.responseText); } catch(e) {}
        }
      })();
    </script>
    <!-- jsQR for QR code detection -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js" defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
